<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>
Matlhavani Digital Solutions Portfolio
</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #0f172a;
  color: white;
}

header {
  text-align: center;
  padding: 40px;
  background: #111827;
}

.container {
  max-width: 1000px;
  margin: auto;
  padding: 20px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 15px;
}

.card {
  background: #1e293b;
  padding: 10px;
  border-radius: 10px;
}

.card img {
  width: 100%;
  border-radius: 8px;
}
</style>

</head>

<body>

<header>
  <h1>My Work Portfolio</h1>
  <p>Showcasing my projects and websites</p>
</header>

<div class="container">

  <div class="grid">

    <div class="card">
      <img src="project1.png" alt="Matlhavani Digital Solutions Website">
      <p>Matlhavani Digital Solutions Website</p>
    </div>

    <div class="card">
      <img src="project2.png" alt="Business Landing Page Design">
      <p>Business Landing Page Design</p>
    </div>

  </div>

</div>

</body>
</html>
